<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cors</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.6/axios.min.js"></script>
    <script>
      function sendRequest() {
        const ans = axios.post("http://localhost:3000/sum", {
          a: document.getElementById("a").value,
          b: document.getElementById("b").value,
        });
      }
      //serves a folder over http : npx serve
    </script>
  </head>
  <body>
    <input type="text" id="a" placeholder="first value" />
    <input type="text" id="b" placeholder="second value" />
    <button onclick="sendRequest()">Find sum</button>
  </body>
</html>
