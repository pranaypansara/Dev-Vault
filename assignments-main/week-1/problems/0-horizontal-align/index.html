<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizontal Align</title>
    <style>
      .container {
        width: 1200px;
        margin: 0px auto;
        background-color: red;
        display: flex;
        justify-content: center;
      }

      .content {
        height: 500px;
        display: flex;
        flex-direction: column;
        /* for flex direction column: justify content is vertical and align items is horizontal */
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>

  <body>
    <!-- thils is the solution for both 0 and 1 -->
    <div style="display: flex; justify-content: center">
      <div class="container">
        <div class="content">
          <h1>Hello World</h1>
          <h1>Hello World 2</h1>
        </div>
      </div>
    </div>
  </body>
</html>
